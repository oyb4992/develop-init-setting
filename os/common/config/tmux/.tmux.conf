# === repo 파일로 대체하는 방법 ===
# 기존 ~/.tmux.conf 백업
# mv ~/.tmux.conf ~/.tmux.conf.backup

# repo 파일을 ~/.tmux.conf로 연결
# ln -s /Users/oyunbog/IdeaProjects/dev-init-setting/os/common/config/tmux/.tmux.conf ~/.tmux.conf

# === Prefix 변경 (Ctrl+Space, Ctrl+b도 유지) ===
# set -g prefix C-Space
# set -g prefix2 C-b
# bind C-Space send-prefix

# === 기본 설정 ===
set-option -g history-limit 50000

# ─── Pane 분할 (직관적 키로 재매핑) ─────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ',xterm-ghostty:RGB,clipboard'
set -g automatic-rename off
set -g mouse on
set -g allow-passthrough on
set -g pane-border-format " #{pane_index} #{pane_current_command} "
set -g pane-border-status top
set -g pane-border-lines double
# set -g set-clipboard on
set -g set-clipboard external

# === 복사 모드 (vi) ===
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# 마우스 스크롤 속도 (기본 3 → 5줄씩)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down

# === 플러그인 ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
# vim-tmux-navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

# yank
set -g @plugin 'tmux-plugins/tmux-yank'

# 기본 개선
set -g @plugin 'tmux-plugins/tmux-sensible'

# yazi 파일 탐색기 (Prefix + Tab: 50% 분할)
# brew install yazi
# if-shell 'command -v yazi' bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"
bind Tab if-shell 'command -v yazi >/dev/null 2>&1' \
  'split-window -h -l 50% -c "#{pane_current_path}" "yazi"' \
  'display-message "yazi not found: brew install yazi"'

# === Catppuccin 테마 ===
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# 상태 바 왼쪽: 세션 이름
set -g status-left-length 40
set -g status-left "#{E:@catppuccin_status_session}"

# 상태 바 오른쪽: 디렉토리 + Git 브랜치 + CPU + 메모리 + 배터리 + 시간
set -g status-interval 10
set -g status-right-length 150
set -g @catppuccin_date_time_text " %m/%d %H:%M"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#[bg=default] #[fg=#a6e3a1,bg=#313244]  #(cd #{q:pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') "
set -ag status-right "#[bg=default] #[fg=#89b4fa,bg=#313244]  #{cpu_percentage} "
set -ag status-right "#[bg=default] #[fg=#f9e2af,bg=#313244]  #{ram_percentage} "
set -ag status-right "#[bg=default] #[fg=#f5c2e7,bg=#313244] #{battery_icon} #{battery_percentage} "
set -ag status-right "#{E:@catppuccin_status_date_time}"

# 윈도우 탭 (현재 선택 윈도우 강조)
set -g @catppuccin_window_text " #I:#{=10:window_name} "
set -g @catppuccin_window_current_text " #[bold] *#I:#W* "

# === Pane 이동 (Ctrl + hjkl, prefix 없이) ===
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R
bind L last-window
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# === TPM 실행 ===
# TPM (Tmux Plugin Manager) 설치
# https://github.com/tmux-plugins/tpm?tab=readme-ov-file#installation
if-shell '[ -d ~/.tmux/plugins/tpm ]' \
  "run '~/.tmux/plugins/tpm/tpm'" \
  "display-message 'TPM not installed: ~/.tmux/plugins/tpm'"
