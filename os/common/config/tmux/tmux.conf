# ~/.config/tmux/tmux.conf
# ─── Prefix 변경: Ctrl+B → Ctrl+Space ────
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# ─── 기본 환경 ────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10                   # Neovim/Vim 사용 시 필수
set -g history-limit 50000               # 영상에서 강조한 히스토리 5만 줄
set -g mouse on                          # 마우스 활성화
set -g base-index 1                      # 윈도우 인덱스 1부터 시작
set -g pane-base-index 1
set -g renumber-windows on

# ─── 상태바 위치 ──────────────────────────
set-option -g status-position top

# ─── Vi 키바인딩 ──────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ─── Pane 분할 (직관적 키로 재매핑) ─────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Pane 이동: Option+hjkl (영상 방식) ────
# (macos-option-as-alt = true 설정 필요)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ─── Pane 크기 조절 ───────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Pane Zoom (영상에서 z키 강조) ─────────
bind -r m resize-pane -Z

# ─── 설정 즉시 리로드 ─────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded!"

# ─── Yazi 파일탐색기 토글 (Tab 키) ──────────
bind Tab split-window -h -l 40% "yazi"

# ─── 세션/윈도우 목록 단축키 ──────────────
bind s choose-session
bind w choose-window

# ─── 플러그인 ─────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'  # Neovim 연동
set -g @plugin 'tmux-plugins/tmux-resurrect'     # 세션 영속
set -g @plugin 'tmux-plugins/tmux-continuum'     # 자동 저장
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ─── Catppuccin 테마 설정 ─────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"

# ─── 상태바 (영상처럼 좌: 세션, 우: CPU/배터리/시간) ─
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ─── Resurrect / Continuum ────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ─── TPM 초기화 (반드시 마지막 줄) ──────────
# TPM (Tmux Plugin Manager) 설치
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'
