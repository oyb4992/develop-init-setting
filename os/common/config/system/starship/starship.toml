[mise]
disabled = false
symbol = "ůĪĀ§"
healthy_symbol = "ÔÄĆ"
unhealthy_symbol = "ÔĀĪ"
style = "bg:#212736"
format = '[[ $symbol $health ](fg:#bb9af7 bg:#212736)]($style)'

[sudo]
disabled = false
symbol = "ůįĆĺ"
style = "bg:#212736"
format = '[[ $symbol ](fg:#f7768e bg:#212736)]($style)'

[jobs]
disabled = false
symbol = "ÔāÖ "
symbol_threshold = 1
number_threshold = 2
style = "bg:#1d2230"
format = '[[ $symbol$number ](fg:#7dcfff bg:#1d2230)]($style)'

[cmd_duration]
min_time = 1000
style = "bg:#1d2230"
format = '[[ ÔČí $duration ](fg:#e0af68 bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[ Ôźļ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[status]
disabled = false
symbol = "ÔÄć"
format = '[$symbol $status ](bold fg:#f7768e)'

[username]
show_always = false
style_user = "fg:#c0caf5 bg:#769ff0"
format = '[ ÔÄá $user ]($style)'

[hostname]
ssh_only = true
style = "fg:#7dcfff bg:#769ff0"
format = '[@$hostname ]($style)'

[shell]
disabled = false
bash_indicator = "bash"
zsh_indicator = "zsh"
fish_indicator = "fish"
style = "fg:#c0caf5 bg:#769ff0"
format = '[$indicator ]($style)'

