"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
$os\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$username\
$hostname\
$shell\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
$git_state\
$git_status\
[Óāī](fg:#394260 bg:#212736)\
$nodejs\
$package\
$java\
$gradle\
$rust\
$golang\
$php\
$docker_context\
$sudo\
[Óāī](fg:#212736 bg:#1d2230)\
$jobs\
$cmd_duration\
$time\
[Óāī ](fg:#1d2230)\
\n$status$character"""

[os]
disabled = false
style = "fg:#090c0c bg:#a3aed2"
format = "[ $symbol]($style)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "fg:#7dcfff bg:#394260"
format = "[ $symbol $branch ]($style)"

[git_state]
style = "fg:#e0af68 bg:#394260"
format = "[ $state( $progress_current/$progress_total) ]($style)"

[git_status]
style = "fg:#f7768e bg:#394260"
format = "[ $all_status$ahead_behind ]($style)"

[nodejs]
symbol = "Óúė"
style = "fg:#9ece6a bg:#212736"
format = "[ $symbol Node ($version) ]($style)"

[package]
display_private = true
symbol = "ůįŹó"
style = "fg:#c0caf5 bg:#212736"
format = "[ $symbol ($version) ]($style)"

[java]
symbol = "Óúł"
style = "fg:#e0af68 bg:#212736"
format = "[ $symbol Java ($version) ]($style)"
detect_extensions = ["java", "class", "gradle", "jar"]
detect_files = ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts", "gradlew", ".java-version", ".sdkmanrc"]

[gradle]
symbol = "Óô†"
style = "fg:#7dcfff bg:#212736"
format = "[ $symbol Gradle ($version) ]($style)"
detect_extensions = ["gradle", "gradle.kts"]
detect_files = ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts", "gradlew"]
detect_folders = ["gradle"]

[rust]
symbol = "Óě®"
style = "fg:#f7768e bg:#212736"
format = "[ $symbol Rust ($version) ]($style)"

[golang]
symbol = "Óėß"
style = "fg:#7dcfff bg:#212736"
format = "[ $symbol Go ($version) ]($style)"

[php]
symbol = "Óėą"
style = "fg:#bb9af7 bg:#212736"
format = "[ $symbol PHP ($version) ]($style)"

[docker_context]
symbol = "ÔĆą"
style = "fg:#7aa2f7 bg:#212736"
format = "[ $symbol Docker ($context) ]($style)"

[sudo]
disabled = false
symbol = "ůįĆĺ"
style = "fg:#f7768e bg:#212736"
format = "[ $symbol ]($style)"

[jobs]
symbol = "ÔāÖ "
style = "fg:#7dcfff bg:#1d2230"
format = "[ $symbol$number ]($style)"

[cmd_duration]
min_time = 1000
style = "fg:#e0af68 bg:#1d2230"
format = "[ ÔČí $duration ]($style)"

[time]
disabled = false
time_format = "%R"
style = "fg:#a0a9cb bg:#1d2230"
format = "[ Ôźļ $time ]($style)"

[status]
disabled = false
symbol = "ÔÄć"
format = '[$symbol $status ](bold fg:#f7768e)'

[username]
style_user = "fg:#c0caf5 bg:#769ff0"
format = '[ ÔÄá $user ]($style)'

[hostname]
style = "fg:#7dcfff bg:#769ff0"
format = '[@$hostname ]($style)'

[shell]
disabled = false
bash_indicator = "bash"
zsh_indicator = "zsh"
style = "fg:#c0caf5 bg:#769ff0"
format = '[$indicator ]($style)'
