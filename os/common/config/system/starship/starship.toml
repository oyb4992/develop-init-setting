"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 30
command_timeout = 1000

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
[ ÓúĎ ](bg:#a3aed2 fg:#090c0c)\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$username\
$hostname\
$shell\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[Óāī](fg:#394260 bg:#212736)\
$nodejs\
$package\
$java\
$gradle\
$maven\
$rust\
$golang\
$php\
$docker_context\
$mise\
$sudo\
[Óāī](fg:#212736 bg:#1d2230)\
$jobs\
$cmd_duration\
$time\
[Óāī ](fg:#1d2230)\
\n$status$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#7dcfff bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[ $all_status$ahead_behind ](fg:#f7768e bg:#394260)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#212736"
format = '[[ $symbol Node ($version) ](fg:#9ece6a bg:#212736)]($style)'
detect_extensions = ["js", "mjs", "cjs", "jsx", "ts", "mts", "cts", "tsx"]
detect_files = ["package.json", ".node-version", ".nvmrc", "tsconfig.json", "vite.config.js", "vite.config.ts", "next.config.js", "next.config.ts"]
detect_folders = ["node_modules"]

# [bun]
# symbol = "ÓĚĮ"
# style = "bg:#212736"
# format = '[[ $symbol Bun ($version) ](fg:#ff9e64 bg:#212736)]($style)'

[package]
disabled = false
display_private = true
symbol = "ůįŹó"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#212736)]($style)'

[java]
symbol = "Óúł"
style = "bg:#212736"
format = '[[ $symbol Java ($version) ](fg:#e0af68 bg:#212736)]($style)'
detect_extensions = ["java", "class", "gradle", "jar", "clj", "cljs", "cljc"]
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts", "gradlew", "build.sbt", ".java-version", "deps.edn", "project.clj", "build.boot", ".sdkmanrc"]

[gradle]
disabled = false
symbol = "Óô†"
style = "bg:#212736"
format = '[[ $symbol Gradle ($version) ](fg:#7dcfff bg:#212736)]($style)'
detect_extensions = ["gradle", "gradle.kts"]
detect_files = ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts", "gradlew"]
detect_folders = ["gradle"]

[maven]
disabled = false
symbol = "Óôī"
style = "bg:#212736"
format = '[[ $symbol Maven ($version) ](fg:#7dcfff bg:#212736)]($style)'
detect_files = ["pom.xml"]
detect_folders = [".mvn"]

[rust]
symbol = "Óě®"
style = "bg:#212736"
format = '[[ $symbol Rust ($version) ](fg:#f7768e bg:#212736)]($style)'

[golang]
symbol = "Óėß"
style = "bg:#212736"
format = '[[ $symbol Go ($version) ](fg:#7dcfff bg:#212736)]($style)'

[php]
symbol = "Óėą"
style = "bg:#212736"
format = '[[ $symbol PHP ($version) ](fg:#bb9af7 bg:#212736)]($style)'

[docker_context]
disabled = false
symbol = "ÔĆą"
style = "bg:#212736"
format = '[[ $symbol Docker ($context) ](fg:#7aa2f7 bg:#212736)]($style)'

#[aws]
#disabled = false
#force_display = false
#symbol = "ÓĆĹ"
#style = "bg:#212736"
#format = '[[ $symbol AWS ($profile)(\($region\)) ](fg:#e0af68 bg:#212736)]($style)'
